<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glenn Rogers — Visual Storyteller</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Framer Motion CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.3/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        gold: {
                            DEFAULT: '#D4AF37',
                            light: '#F1E5AC',
                            dark: '#996515',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: black; color: white; overflow-x: hidden; }
        .selection-gold::selection { background: #D4AF37; color: black; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
        .shutter-blade { fill: #262626; stroke: rgba(255,255,255,0.1); stroke-width: 0.15; }
        .will-change-transform { will-change: transform; }
    </style>
</head>
<body class="selection-gold">
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence, useScroll, useTransform } = window.Motion;
        const { useState, useEffect, useRef } = React;

        // Icons Helper
        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const ShutterPreloader = ({ onComplete }) => {
            const [isOpening, setIsOpening] = useState(false);

            useEffect(() => {
                // Start opening after a short delay to ensure initial render is stable
                const timer = setTimeout(() => setIsOpening(true), 1200);
                // Complete the whole sequence after 5 seconds
                const completeTimer = setTimeout(onComplete, 5000);
                return () => { clearTimeout(timer); clearTimeout(completeTimer); };
            }, [onComplete]);

            const blades = Array.from({ length: 8 });

            return (
                <motion.div
                    className="fixed inset-0 z-50 flex items-center justify-center bg-black overflow-hidden"
                    initial={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    transition={{ duration: 1, ease: "easeInOut" }}
                >
                    <div className="relative w-[200vmax] h-[200vmax] flex items-center justify-center will-change-transform">
                        {blades.map((_, i) => (
                            <motion.div
                                key={i}
                                className="absolute w-full h-full"
                                style={{ rotate: i * 45, transformOrigin: "50% 50%" }}
                            >
                                <motion.svg
                                    viewBox="0 0 100 100"
                                    className="w-full h-full shutter-blade will-change-transform"
                                    initial={{ rotate: 0, x: 0, y: 0 }}
                                    animate={{
                                        rotate: isOpening ? -20 : 0,
                                        x: isOpening ? "20%" : "0%",
                                        y: isOpening ? "-20%" : "0%",
                                    }}
                                    transition={{ duration: 3.2, ease: [0.65, 0, 0.35, 1] }}
                                >
                                    <path d="M50,50 C60,40 80,30 100,20 L100,100 L50,100 Z" />
                                </motion.svg>
                            </motion.div>
                        ))}
                        
                        <motion.div
                            className="z-10 text-center pointer-events-none"
                            initial={{ opacity: 0, scale: 0.95 }}
                            animate={{ opacity: isOpening ? 0 : 1, scale: isOpening ? 1.2 : 1 }}
                            transition={{ duration: 1.2, ease: "easeOut" }}
                        >
                            <h1 className="font-serif text-4xl md:text-6xl tracking-[0.4em] uppercase text-gold drop-shadow-2xl">
                                Glenn Rogers
                            </h1>
                            <p className="text-[10px] uppercase tracking-[0.6em] text-neutral-400 mt-6 font-light">
                                Calibrating Optics
                            </p>
                        </motion.div>
                    </div>
                    <div className="absolute inset-0 pointer-events-none bg-[radial-gradient(circle,transparent_40%,black_100%)] opacity-60" />
                </motion.div>
            );
        };

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 w-full z-40 transition-all duration-500 ${scrolled ? "bg-black/80 backdrop-blur-md py-4" : "bg-transparent py-8"}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <div className="font-serif text-2xl tracking-tighter text-gold">G.R.</div>
                        <div className="hidden md:flex space-x-12 items-center">
                            {["Work", "About", "Contact"].map((item) => (
                                <a key={item} href={`#${item.toLowerCase()}`} className="text-xs uppercase tracking-[0.3em] hover:text-gold transition-colors">{item}</a>
                            ))}
                        </div>
                        <Icon name="menu" className="w-6 h-6 text-gold md:hidden" />
                    </div>
                </nav>
            );
        };

        const ProjectCard = ({ title, category, image, index }) => (
            <motion.div
                initial={{ opacity: 0, y: 50 }}
                whileInView={{ opacity: 1, y: 0 }}
                viewport={{ once: true }}
                transition={{ duration: 0.8, delay: index * 0.1 }}
                className="group relative aspect-[4/5] overflow-hidden bg-neutral-900"
            >
                <img src={image} alt={title} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110 grayscale group-hover:grayscale-0" />
                <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex flex-col justify-end p-8">
                    <p className="text-gold text-xs uppercase tracking-widest mb-2">{category}</p>
                    <h3 className="font-serif text-2xl mb-4">{title}</h3>
                    <button className="flex items-center text-[10px] uppercase tracking-widest group/btn">
                        View Project <Icon name="arrow-right" className="ml-2 w-4 h-4 transition-transform group-hover/btn:translate-x-2" />
                    </button>
                </div>
            </motion.div>
        );

        const MainContent = () => {
            const containerRef = useRef(null);
            const { scrollYProgress } = useScroll({ target: containerRef, offset: ["start start", "end end"] });
            const heroScale = useTransform(scrollYProgress, [0, 0.2], [1, 1.1]);
            const heroOpacity = useTransform(scrollYProgress, [0, 0.2], [1, 0.5]);

            return (
                <motion.div ref={containerRef} initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 1 }}>
                    <Navbar />
                    <section className="relative h-screen flex items-center justify-center overflow-hidden">
                        <motion.div style={{ scale: heroScale, opacity: heroOpacity }} className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&q=80&w=2071" className="w-full h-full object-cover grayscale opacity-40" />
                        </motion.div>
                        <div className="container mx-auto px-6 z-10 text-center">
                            <p className="text-gold text-xs uppercase tracking-[0.5em] mb-6">Visual Storyteller & Photographer</p>
                            <h1 className="font-serif text-6xl md:text-9xl tracking-tighter mb-8">Glenn <span className="italic text-gold">Rogers</span></h1>
                            <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center">
                                <Icon name="chevron-down" className="w-4 h-4 text-gold animate-bounce" />
                            </div>
                        </div>
                    </section>

                    <section id="about" className="py-32 bg-neutral-950">
                        <div className="container mx-auto px-6">
                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <motion.div initial={{ opacity: 0, x: -50 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }}>
                                    <h2 className="font-serif text-4xl md:text-6xl mb-8 leading-tight">Capturing the <span className="text-gold italic">unseen</span> moments.</h2>
                                    <p className="text-neutral-400 text-lg leading-relaxed mb-8">Based in London, I specialize in cinematic photography. My work explores the intersection of light and emotion.</p>
                                    <div className="flex space-x-6">
                                        <Icon name="instagram" className="w-5 h-5 hover:text-gold cursor-pointer" />
                                        <Icon name="twitter" className="w-5 h-5 hover:text-gold cursor-pointer" />
                                        <Icon name="mail" className="w-5 h-5 hover:text-gold cursor-pointer" />
                                    </div>
                                </motion.div>
                                <div className="aspect-[3/4] overflow-hidden grayscale">
                                    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=1974" className="w-full h-full object-cover" />
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="work" className="py-32">
                        <div className="container mx-auto px-6">
                            <h2 className="font-serif text-5xl md:text-7xl mb-16 tracking-tighter italic">Selected Works</h2>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                <ProjectCard index={0} title="Shadows of London" category="Editorial" image="https://images.unsplash.com/photo-1514565131-fce0801e5785?auto=format&fit=crop&q=80&w=1974" />
                                <ProjectCard index={1} title="The Minimalist" category="Portrait" image="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=1974" />
                                <ProjectCard index={2} title="Urban Silence" category="Architecture" image="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2070" />
                                <ProjectCard index={3} title="Golden Hour" category="Landscape" image="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&q=80&w=1974" />
                                <ProjectCard index={4} title="Vogue Editorial" category="Fashion" image="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&q=80&w=1974" />
                                <ProjectCard index={5} title="Cinematic Frames" category="Film" image="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&q=80&w=2059" />
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 border-t border-neutral-900 text-center text-neutral-500 text-[10px] uppercase tracking-[0.3em]">
                        © 2026 Glenn Rogers. All Rights Reserved.
                    </footer>
                </motion.div>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            return (
                <div className="relative bg-black min-h-screen">
                    <AnimatePresence>{loading && <ShutterPreloader onComplete={() => setLoading(false)} />}</AnimatePresence>
                    {!loading && <MainContent />}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
